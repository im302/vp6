        ];
        const codeDaysFinal = codeDays.filter(d => d !== '2026-08-16' && d !== '2026-08-23');

        const englishDays = [
            '2026-07-05', '2026-07-12', '2026-07-19', '2026-07-23',
            '2026-07-26', '2026-07-30',
            '2026-08-02', '2026-08-09', '2026-08-16', '2026-08-23', '2026-08-30'

        ];

        // ============================================================
        //  2. 编码函数
        // ============================================================
        function getCode(dateStr) {
            let code = 0;
            const d = new Date(dateStr);
            const dayOfWeek = d.getDay();
            const isWeekday = (dayOfWeek >= 1 && dayOfWeek <= 5);
            const hasChinese = isWeekday && dateStr >= CHINESE_START && dateStr <= CHINESE_END;

            // ★ 军训优先：有军训时覆盖其他课程（除了数学8/15-18不重叠）
            if (militaryDays.includes(dateStr)) {
                // 军训日只显示军训，不加其他编码
                return 0;
            }

            if (hasChinese) code += 8;
            if (mathDays.includes(dateStr)) code += 4;
            if (englishDays.includes(dateStr)) code += 2;
            if (codeDaysFinal.includes(dateStr)) code += 1;
            return code;
        }

        function getCodeStr(dateStr) {
            return getCode(dateStr).toString(2).padStart(4, '0');

                    ['16:00-18:00', '🎮 游戏时间'],
                    ...dailyBase.slice(7)
                ]
            },
            '1010': {
                combo: '语文 + 英语',
                dates: '7/23',
                items: [
                    ['07:30-08:00', '起床 & 早餐'],
                    ['08:00-08:20', '📖 晨读 / 预习'],
                    ['08:30-12:00', '📚 语文课', 'chinese'],
                    ...dailyBase.slice(1, 4),
                    ['14:00-15:30', '📝 暑假作业'],
                    ['15:30-16:00', '✍️ 字帖'],
                    ['16:00-18:00', '🎮 游戏时间'],
                    ['18:00-18:30', '晚餐'],
                    ['18:30-21:30', '🇬🇧 英语课', 'english'],
                    ...dailyBase.slice(8)
                ]
            },
            // ★ 新增军训编码（使用 'military' 作为特殊标识）
            'military': {
                combo: '🎖️ 军训日',
                dates: '8/21, 8/22, 8/23, 8/24, 8/25',
                items: militarySchedule
            }
        };

        // ============================================================
        //  5. 渲染日历
        // ============================================================
        function renderMonth(year, month, containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const daysInMonth = lastDay.getDate();
            let startOffset = firstDay.getDay() - 1;
            if (startOffset === -1) startOffset = 6;
            let html = '';
            for (let i = 0; i < startOffset; i++) {
                html += `<div class="day-cell empty"></div>`;
            }
            const today = new Date();
            const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

            for (let d = 1; d <= daysInMonth; d++) {
                const dateObj = new Date(year, month, d);
                const dayOfWeek = dateObj.getDay();
                const isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const isToday = (dateStr === todayStr);

                const code = getCode(dateStr);
                const codeStr = code.toString(2).padStart(4, '0');
                const isMil = isMilitaryDay(dateStr);

                let labels = [];
                let subLabels = [];

                // ★ 军训优先显示
                if (isMil) {
                    labels.push({ text: '🎖️ 军训', cls: 'military' });
                    subLabels.push('全天');
                } else {
                    if (code & 8) labels.push({ text: '📚 语文', cls: 'chinese' });
                    if (code & 4) { labels.push({ text: '🧮 数学', cls: 'math' }); subLabels.push('18:00'); }
                    if (code & 2) { labels.push({ text: '🇬🇧 英语', cls: 'english' }); subLabels.push('18:30'); }
                    if (code & 1) { labels.push({ text: '💻 编程', cls: 'code' }); subLabels.push('10:00'); }
                }

                if (labels.length === 0) {
                    labels.push({ text: '☀️ 自由', cls: 'rest' });
                }

                let classes = 'day-cell';
                if (isWeekend) classes += ' weekend';
                if (isToday) classes += ' today';

                let labelHtml = labels.map(l => `<div class="day-label ${l.cls}">${l.text}</div>`).join('');
                let subHtml = subLabels.length > 0 ? `<div class="sub-label">${subLabels.join(' ')}</div>` : '';

                // 军训日点击跳转到 military 卡片
                const targetCode = isMil ? 'military' : codeStr;

                html += `<div class="${classes}" data-code="${targetCode}" data-date="${dateStr}" onclick="jumpToDetail('${targetCode}')">
                            <div class="day-number">${d}</div>
                            ${labelHtml}
                            ${subHtml}
                        </div>`;
            }
            container.innerHTML = html;
        }

        // ============================================================
        //  6. 跳转函数
        // ============================================================
        window.jumpToDetail = function(codeStr) {
            const target = document.getElementById('detail-' + codeStr);
            if (target) {
                target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                target.classList.remove('highlight');
                void target.offsetWidth;
                target.classList.add('highlight');
                setTimeout(() => {
                    target.classList.remove('highlight');
                }, 3000);
            }
        };

        window.scrollToDetail = window.jumpToDetail;

        // ============================================================
        //  7. 渲染日程详情
        // ============================================================
        function renderDetails() {
            const container = document.getElementById('detailGrid');
            const codes = ['0000', '0001', '0010', '0011', '0100', '0110', '1000', '1010', 'military'];
            let html = '';
            codes.forEach(code => {
                const data = scheduleDB[code];
                if (!data) return;
                const isMil = code === 'military';
                html += `<div class="detail-card" id="detail-${code}">
                            <div class="card-header">
                                <span class="code-tag">${isMil ? '🎖️' : code}</span>
                                <span class="combo">${data.combo}</span>
                            </div>
                            <div class="date-list">📌 ${data.dates}</div>
                            ${data.items.map(item => {
                                let actHtml = item[1];
                                if (item[2]) {
                                    const cls = item[2];
                                    const label = cls === 'chinese' ? '语文' : cls === 'math' ? '数学' : cls === 'english' ? '英语' : cls === 'code' ? '编程' : cls === 'military' ? '军训' : '';
                                    actHtml += ` <span class="tag-mini ${cls}">${label}</span>`;
                                }
                                return `<div class="schedule-item"><span class="stime">${item[0]}</span><span class="sact">${actHtml}</span></div>`;
                            }).join('')}
                        </div>`;
            });
            container.innerHTML = html;
        }

        // ============================================================
        //  8. 今日徽章
        // ============================================================
        function updateBadge() {
            const now = new Date();
            const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
            const weekdays = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];
            const wd = weekdays[now.getDay() === 0 ? 6 : now.getDay() - 1];
            const isMil = isMilitaryDay(dateStr);
            const code = getCode(dateStr);
            const codeStr = code.toString(2).padStart(4, '0');
            let badgeText = `📅 ${dateStr} ${wd}`;
            if (isMil) {
                badgeText += ' 🎖️ 军训';
            } else {
                badgeText += ` 编码: ${codeStr}`;
            }
            document.getElementById('todayBadge').textContent = badgeText;
        }

        // ============================================================
        //  9. 初始化
        // ============================================================
        renderMonth(YEAR, 6, 'julyGrid');
        renderMonth(YEAR, 7, 'augustGrid');
        renderDetails();
        updateBadge();
    })();
</script>
